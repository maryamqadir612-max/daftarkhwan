name: Auto Label HTML PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Add HTML label if HTML files changed
        if: contains(steps.changed-files.outputs.all_changed_files, '.html')
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: html
